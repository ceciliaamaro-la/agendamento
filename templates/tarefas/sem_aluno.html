{% extends 'base.html' %}
{% block title %}Tarefas{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <i class="bi bi-person-x display-1 text-muted mb-3 d-block"></i>
            <h4 class="fw-semibold mb-2">Nenhum aluno vinculado</h4>
            <p class="text-muted mb-4">
                Sua conta ainda não está vinculada a nenhum aluno.<br>
                Peça ao administrador para vincular seu usuário a um aluno na tela de edição do aluno.

            <a href="{% url 'cal:home' %}" class="btn btn-primary">
                <i class="bi bi-house me-1"></i> Voltar ao início
            </a>
        </div>
    </div>
</div>
{% endblock %}
