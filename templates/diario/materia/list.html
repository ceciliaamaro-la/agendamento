{% extends 'base.html' %}
{% block title %}Matérias{% endblock %}
{% block content %}
<div class="container-fluid mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold text-primary"><i class="bi bi-book-fill"></i> Matérias</h2>
    <a href="{% url 'cal:materia_create' %}" class="btn btn-success btn-sm">
      <i class="bi bi-plus-circle"></i> Nova Matéria
    </a>
  </div>
  <div class="card shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>Nome</th>
            <th class="text-center" style="width:120px">Ações</th>
          </tr>
        </thead>
        <tbody>
          {% for m in materias %}
          <tr>
            <td>{{ m.nome_materia }}</td>
            <td class="text-center text-nowrap">
              <a href="{% url 'cal:materia_update' m.pk %}" class="btn btn-sm btn-warning me-1">
                <i class="bi bi-pencil"></i>
              </a>
              <a href="{% url 'cal:materia_delete' m.pk %}" class="btn btn-sm btn-danger">
                <i class="bi bi-trash"></i>
              </a>
            </td>
          </tr>
          {% empty %}
          <tr><td colspan="2" class="text-center text-muted py-4">Nenhuma matéria cadastrada.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
