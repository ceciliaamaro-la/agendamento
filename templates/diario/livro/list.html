{% extends 'base.html' %}
{% block title %}Livros{% endblock %}
{% block content %}
<div class="container-fluid mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold text-primary"><i class="bi-journal-bookmark-fill"></i> Livros</h2>
    <a href="{% url 'cal:livro_create' %}" class="btn btn-success btn-sm">
      <i class="bi bi-plus-circle"></i> Novo
    </a>
  </div>
  <div class="card shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr><th>Nome</th><th>Escola</th><th>Matéria</th><th class="text-center" style="width:120px">Ações</th></tr>
        </thead>
        <tbody>
          {% for l in livros %}
          <tr>
            <td>{{ l.nome_livro }}</td>
            <td>{{ l.escola }}</td>
            <td>{{ l.materia }}</td>
            <td class="text-center text-nowrap">
              <a href="{% url 'cal:livro_update' l.pk %}" class="btn btn-sm btn-warning me-1"><i class="bi bi-pencil"></i></a>
              <a href="{% url 'cal:livro_delete' l.pk %}" class="btn btn-sm btn-danger"><i class="bi bi-trash"></i></a>
            </td>
          </tr>
          {% empty %}
          <tr><td colspan="4" class="text-center text-muted py-4">Nenhum registro encontrado.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
