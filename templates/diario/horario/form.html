{% extends 'base.html' %}
{% load static %}
{% block title %}{{ titulo }}{% endblock %}
{% block content %}
<div class="container mt-4" style="max-width:780px">
  <div class="d-flex align-items-center mb-3 gap-2">
    <a href="{% url 'cal:horario_list' %}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
    <h4 class="mb-0 fw-bold"><i class="bi bi-clock-fill text-primary me-1"></i>{{ titulo }}</h4>
  </div>
  <div class="card shadow-sm">
    <div class="card-body">
      <form method="post" novalidate>
        {% csrf_token %}
        <div class="row g-3">
          {% for field in form %}
          <div class="col-md-6">
            <label class="form-label fw-semibold" for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors|join:", " }}</div>{% endif %}
          </div>
          {% endfor %}
        </div>
        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Salvar</button>
          <a href="{% url 'cal:horario_list' %}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  window.CASCADE_URLS = {
    professor: "{% url 'cal:cascade_professor' 0 %}".replace('/0/', '/__pk__/'),
    turma:     "{% url 'cal:cascade_turma' 0 %}".replace('/0/', '/__pk__/'),
    materia:   "{% url 'cal:cascade_materia' 0 %}".replace('/0/', '/__pk__/'),
  };
</script>
<script src="{% static 'js/cascade.js' %}"></script>
{% endblock %}
