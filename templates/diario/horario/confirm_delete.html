{% extends 'base.html' %}
{% block title %}{{ titulo }}{% endblock %}
{% block content %}
<div class="container mt-4" style="max-width:480px">
  <div class="card shadow-sm border-danger">
    <div class="card-header bg-danger text-white fw-bold">
      <i class="bi bi-exclamation-triangle me-1"></i>{{ titulo }}
    </div>
    <div class="card-body">
      <p>Confirma a exclusão de <strong>{{ obj }}</strong>?</p>
      <p class="text-muted small">Esta ação não pode ser desfeita.</p>
      <form method="post" class="d-flex gap-2">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i>Excluir</button>
        <a href="{% url 'cal:horario_list' %}" class="btn btn-outline-secondary">Cancelar</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
