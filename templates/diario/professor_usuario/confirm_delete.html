{% extends 'base.html' %}
{% block title %}{{ titulo }}{% endblock %}
{% block content %}
<div class="container mt-4" style="max-width:560px">
  <div class="card shadow-sm p-4">
    <h2 class="fw-bold text-danger"><i class="bi bi-trash"></i> {{ titulo }}</h2>
    <p class="mt-3">Excluir o vínculo <strong>{{ obj }}</strong>? O histórico será removido.</p>
    <form method="post" class="d-flex gap-2 justify-content-end">{% csrf_token %}
      <a href="{% url 'cal:vinculo_list' %}" class="btn btn-secondary">Cancelar</a>
      <button class="btn btn-danger" type="submit">Excluir</button>
    </form>
  </div>
</div>
{% endblock %}
